name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            cmake \
            ninja-build \
            wget \
            libsodium-dev \
            libsecp256k1-dev \
            liblz4-dev
      - name: Install clang 21
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21 clang
      - run: cargo fmt --check
        env:
          CC: clang-21
          CXX: clang++-21
      - run: cargo build --verbose
        env:
          CC: clang-21
          CXX: clang++-21
      - run: cargo test --lib -- --test-threads=1
        env:
          CC: clang-21
          CXX: clang++-21
